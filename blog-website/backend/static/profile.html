<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Modern Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">ModernBlog</h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/popular">Popular</a></li>
                <li><a href="/categories">Categories</a></li>
                <li><a href="/bookmarks" id="bookmarks-link">Bookmarks</a></li>
                <li><a href="/profile" id="profile-link">Profile</a></li>
                <li><a href="/admin" id="admin-link" style="display: none;">Admin</a></li>
                <li><a href="#" id="logout-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <!-- Profile Header -->
        <div class="profile-header fade-in" id="profile-header">
            <!-- Profile info will be loaded here -->
        </div>

        <!-- Profile Edit Form -->
        <div class="auth-form fade-in" id="profile-edit-form" style="display: none;">
            <h2>Edit Profile</h2>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="avatar_url">Avatar URL</label>
                    <input type="url" id="avatar_url" name="avatar_url">
                </div>
                <div class="form-group">
                    <label for="website_url">Website URL</label>
                    <input type="url" id="website_url" name="website_url">
                </div>
                <div class="form-group">
                    <label for="twitter_handle">Twitter Handle</label>
                    <input type="text" id="twitter_handle" name="twitter_handle">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Save Changes</button>
                    <button type="button" class="btn btn-secondary" id="cancel-edit">Cancel</button>
                </div>
            </form>
        </div>

        <!-- User's Posts -->
        <section class="user-posts mt-3">
            <h2 class="mb-2">My Posts</h2>
            <div class="posts-grid" id="user-posts">
                <!-- User posts will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        🌙
    </button>

    <footer>
        <div class="container">
            <p>&copy; 2026 ModernBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
