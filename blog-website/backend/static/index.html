<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Blog - Discover Stories</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">ModernBlog</h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/popular">Popular</a></li>
                <li><a href="/categories">Categories</a></li>
                <li><a href="/bookmarks" id="bookmarks-link" style="display: none;">Bookmarks</a></li>
                <li><a href="/profile" id="profile-link" style="display: none;">Profile</a></li>
                <li><a href="/login" id="login-link">Login</a></li>
                <li><a href="/register" id="register-link">Register</a></li>
                <li><a href="/admin" id="admin-link" style="display: none;">Admin</a></li>
                <li><a href="#" id="logout-link" style="display: none;">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <!-- Search Section -->
        <div class="search-container fade-in">
            <input type="text" class="search-bar" id="search-input" placeholder="Search articles, topics, and authors...">
        </div>

        <!-- Categories Navigation -->
        <div class="categories-nav fade-in" id="categories-nav">
            <button class="category-chip active" data-category="all">All</button>
            <!-- Categories will be loaded here -->
        </div>

        <!-- Popular Posts Section -->
        <section class="popular-section mb-3">
            <h2 class="mb-2">Trending Now</h2>
            <div class="posts-grid" id="popular-posts">
                <!-- Popular posts will be loaded here -->
            </div>
        </section>

        <!-- Latest Posts Section -->
        <section class="latest-section">
            <h2 class="mb-2">Latest Stories</h2>
            <div class="posts-grid" id="posts-list">
                <!-- Posts will be loaded here -->
            </div>
        </section>

        <!-- Newsletter Section -->
        <section class="newsletter-section fade-in">
            <h3>Stay Updated</h3>
            <p>Get the latest stories delivered to your inbox</p>
            <form class="newsletter-form" id="newsletter-form">
                <input type="email" class="newsletter-input" placeholder="Enter your email" required>
                <button type="submit" class="newsletter-btn">Subscribe</button>
            </form>
        </section>
    </main>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        🌙
    </button>

    <footer>
        <div class="container">
            <p>&copy; 2026 ModernBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
