<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks - Modern Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">ModernBlog</h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/popular">Popular</a></li>
                <li><a href="/categories">Categories</a></li>
                <li><a href="/bookmarks" id="bookmarks-link">Bookmarks</a></li>
                <li><a href="/profile" id="profile-link">Profile</a></li>
                <li><a href="/admin" id="admin-link" style="display: none;">Admin</a></li>
                <li><a href="#" id="logout-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h1 class="mb-2 fade-in">My Bookmarks</h1>
        <div class="posts-grid" id="bookmarks-list">
            <!-- Bookmarks will be loaded here -->
        </div>
        <div id="no-bookmarks" class="text-center text-muted" style="display: none;">
            <p>No bookmarks yet. Start saving articles you love!</p>
        </div>
    </main>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        🌙
    </button>

    <footer>
        <div class="container">
            <p>&copy; 2026 ModernBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
